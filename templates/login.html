<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .login-container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .login-container h1 { text-align: center; color: #1a2b4a; margin-bottom: 5px; font-size: 24px; }
        .login-container .subtitle { text-align: center; color: #6c757d; margin-bottom: 30px; font-size: 14px; }
        .login-container label { display: block; font-weight: 600; color: #1e2f4e; margin-bottom: 6px; }
        .login-container input { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #ccd4e0; font-size: 15px; margin-bottom: 20px; }
        .login-container input:focus { outline: 2px solid #6f8fcb; border-color: transparent; }
        .login-container .btn { width: 100%; padding: 12px; background: #1a2b4a; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .login-container .btn:hover { background: #2c4270; }
        .login-container .error { background: #f8d7da; color: #721c24; padding: 10px 16px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid #f5c6cb; }
        .login-container .info { text-align: center; color: #6c757d; font-size: 13px; margin-top: 20px; border-top: 1px solid #e2e7f0; padding-top: 20px; }
        .login-container .info strong { color: #1a2b4a; }
        .login-container .info .demo-row { display: flex; justify-content: center; gap: 30px; margin-top: 8px; flex-wrap: wrap; }
        .login-container .info .demo-item { background: #f8f9fa; padding: 4px 12px; border-radius: 4px; font-size: 13px; }
        .login-container .info .demo-item .login { color: #1a2b4a; font-weight: 600; }
        .login-container .info .demo-item .pass { color: #6c757d; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🚚 Реестр отгрузок</h1>
        <div class="subtitle">Вход в систему</div>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" placeholder="Введите логин" required autofocus>
            
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Введите пароль" required>
            
            <button type="submit" class="btn">Войти</button>
        </form>
        
        <div class="info">
            <div style="margin-bottom: 6px; font-weight: 500;">Тестовые учётные записи:</div>
            <div class="demo-row">
                <div class="demo-item"><span class="login">admin</span> / <span class="pass">admin123</span> <span style="color:#155724; font-size:12px; margin-left:4px;">(полный доступ)</span></div>
                <div class="demo-item"><span class="login">user</span> / <span class="pass">user123</span> <span style="color:#856404; font-size:12px; margin-left:4px;">(ограниченный доступ)</span></div>
            </div>
        </div>
    </div>
</body>
</html>
