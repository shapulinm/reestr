<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление пользователями</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f6f9; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        h1 { color: #1a2b4a; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 8px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #1a2b4a; color: white; }
        .btn-success { background: #1e7e34; color: white; }
        .btn-danger { background: #b02a37; color: white; }
        .btn-warning { background: #d39e00; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-sm { padding: 4px 12px; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #e7ebf4; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #e2e7f0; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; width: 90%; max-width: 500px; border-radius: 16px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; }
        .modal-header .close { font-size: 28px; cursor: pointer; color: #999; }
        .modal-header .close:hover { color: #333; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccd4e0; margin-bottom: 15px; }
        .status-msg { padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .status-msg.success { background: #d4edda; color: #155724; display: block; }
        .status-msg.error { background: #f8d7da; color: #721c24; display: block; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .badge-admin { background: #d4edda; color: #155724; }
        .badge-editor { background: #cce5ff; color: #004085; }
        .badge-user { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
<div class="container">
    <h1>
        👥 Управление пользователями
        <div>
            <button class="btn btn-primary" onclick="openAddModal()">➕ Добавить пользователя</button>
            <a href="/" class="btn btn-secondary">← Назад</a>
        </div>
    </h1>
    
    <div id="statusMsg" class="status-msg"></div>

    <table>
        <thead>
            <tr>
                <th>Логин</th>
                <th>Роль</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="usersTableBody">
            <!-- Загружается через JS -->
        </tbody>
    </table>
</div>

<!-- Модальное окно добавления/редактирования -->
<div id="userModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Добавить пользователя</h2>
            <span class="close" onclick="closeModal()">&times;</span>
        </div>
        <form id="userForm" onsubmit="saveUser(event)">
            <input type="hidden" id="editUserId" value="">
            <label>Логин</label>
            <input type="text" id="usernameInput" placeholder="Введите логин" required>
            <label>Пароль</label>
            <input type="text" id="passwordInput" placeholder="Оставьте пустым, чтобы не менять">
            <label>Роль</label>
            <select id="roleSelect">
                <option value="user">user (только просмотр)</option>
                <option value="editor">editor (редактирование, удаление)</option>
                <option value="admin">admin (полный доступ)</option>
            </select>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                <button type="submit" class="btn btn-success">💾 Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
    let users = [];
    let currentUser = '{{ user }}';

    async function loadUsers() {
        try {
            const response = await fetch('/api/admin/users');
            users = await response.json();
            renderTable();
        } catch (error) {
            showStatus('Ошибка загрузки пользователей', 'error');
        }
    }

    function renderTable() {
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = users.map(u => {
            let badgeClass = 'badge-user';
            let roleLabel = u.role;
            if (u.role === 'admin') { badgeClass = 'badge-admin'; roleLabel = 'admin (полный доступ)'; }
            else if (u.role === 'editor') { badgeClass = 'badge-editor'; roleLabel = 'editor (редактирование)'; }
            else { roleLabel = 'user (просмотр)'; }
            
            return `
            <tr>
                <td><strong>${u.username}</strong> ${u.username === currentUser ? '🔵 (вы)' : ''}</td>
                <td><span class="badge ${badgeClass}">${roleLabel}</span></td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick="openEditModal(${u.id})">✏️</button>
                    ${u.username !== currentUser ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">🗑️</button>` : ''}
                </td>
            </tr>
        `}).join('');
    }

    function openAddModal() {
        document.getElementById('modalTitle').textContent = '➕ Добавить пользователя';
        document.getElementById('editUserId').value = '';
        document.getElementById('usernameInput').value = '';
        document.getElementById('passwordInput').value = '';
        document.getElementById('roleSelect').value = 'user';
        document.getElementById('userModal').style.display = 'block';
    }

    function openEditModal(id) {
        const user = users.find(u => u.id === id);
        if (!user) return;
        document.getElementById('modalTitle').textContent = '✏️ Редактировать пользователя';
        document.getElementById('editUserId').value = id;
        document.getElementById('usernameInput').value = user.username;
        document.getElementById('passwordInput').value = '';
        document.getElementById('roleSelect').value = user.role;
        document.getElementById('userModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('userModal').style.display = 'none';
    }

    async function saveUser(event) {
        event.preventDefault();
        const id = document.getElementById('editUserId').value;
        const username = document.getElementById('usernameInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        const role = document.getElementById('roleSelect').value;

        if (!username) {
            showStatus('Введите логин', 'error');
            return;
        }

        const data = { username, role };
        if (password) data.password = password;

        try {
            const url = id ? `/api/admin/users/${id}` : '/api/admin/users';
            const method = id ? 'PUT' : 'POST';
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (response.ok) {
                showStatus('✅ ' + result.message, 'success');
                closeModal();
                loadUsers();
            } else {
                showStatus('❌ ' + result.message, 'error');
            }
        } catch (error) {
            showStatus('❌ Ошибка сервера', 'error');
        }
    }

    async function deleteUser(id) {
        if (!confirm('Удалить пользователя?')) return;
        try {
            const response = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
            const result = await response.json();
            if (response.ok) {
                showStatus('✅ ' + result.message, 'success');
                loadUsers();
            } else {
                showStatus('❌ ' + result.message, 'error');
            }
        } catch (error) {
            showStatus('❌ Ошибка сервера', 'error');
        }
    }

    function showStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        el.textContent = msg;
        el.className = 'status-msg ' + type;
        setTimeout(() => el.className = 'status-msg', 3000);
    }

    window.onclick = function(event) {
        if (event.target === document.getElementById('userModal')) closeModal();
    };

    loadUsers();
</script>
</body>
</html>
